<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - AssetFlow</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function AboutPage() {
            return (
                <div style={{minHeight: '100vh', display: 'flex', flexDirection: 'column'}}>
                    <nav className="navbar" style={{borderBottom: 'none'}}>
                        <div className="logo">
                            <span className="logo-icon">W</span> WRENCH SOLUTIONS
                        </div>
                        <a href="index.html" style={{textDecoration: 'none', color: 'var(--text-muted)', fontWeight: '600'}}>BACK</a>
                    </nav>

                    <main className="container" style={{flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '4rem 1.5rem'}}>
                        <h1 style={{fontSize: '3.5rem', fontWeight: '800', marginBottom: '2rem'}}>Our Mission.</h1>
                        <p style={{fontSize: '1.25rem', color: 'var(--text-muted)', maxWidth: '800px', lineHeight: '1.6', marginBottom: '4rem'}}>
                            Wrench Solutions is a global leader in predicting and preventing infrastructure degradation. 
                            We empower project management offices (PMOs) and field technicians with real-time data to dramatically reduce 
                            downtime and repair costs.
                        </p>

                        <div style={{
                            background: 'var(--teal-primary)', color: 'white',
                            borderRadius: '16px', padding: '3rem',
                            display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '2rem'
                        }}>
                            <div>
                                <h2 style={{fontSize: '3rem', fontWeight: 'bold', marginBottom: '0.5rem'}}>500+</h2>
                                <p style={{fontSize: '1.125rem'}}>Active Projects globally managed by our predictive engine.</p>
                            </div>
                            <div>
                                <h2 style={{fontSize: '3rem', fontWeight: 'bold', marginBottom: '0.5rem'}}>99.9%</h2>
                                <p style={{fontSize: '1.125rem'}}>Uptime standard for all critical infrastructure assets.</p>
                            </div>
                            <div>
                                <h2 style={{fontSize: '3rem', fontWeight: 'bold', marginBottom: '0.5rem'}}>38%</h2>
                                <p style={{fontSize: '1.125rem'}}>Average cost reduction in preventative maintenance.</p>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AboutPage />);
        setTimeout(() => feather.replace(), 100);
    </script>
</body>
</html>
