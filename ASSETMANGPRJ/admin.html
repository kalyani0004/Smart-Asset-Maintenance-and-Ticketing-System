<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - AssetFlow</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
        .stat-card { border-left: 4px solid var(--teal-primary); }
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 50;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function Sidebar({ setView, setShowModal }) {
            return (
                <div className="sidebar" style={{height: '100vh'}}>
                    <div className="logo" style={{marginBottom: '2rem'}}>
                        <span className="logo-icon">W</span> WRENCH
                    </div>
                    <ul style={{listStyle: 'none'}}>
                        <li style={{marginBottom: '1rem'}}>
                            <a href="#" onClick={() => setView('dashboard')} style={{textDecoration: 'none', color: 'var(--teal-primary)', fontWeight: '600', display: 'flex', alignItems: 'center', gap: '0.5rem'}}>
                                <i data-feather="layout"></i> Dashboard
                            </a>
                        </li>
                        
                        <li style={{marginTop: '1.5rem', marginBottom: '0.5rem', fontSize: '0.75rem', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.05em'}}>Actions</li>
                        
                        <li style={{marginBottom: '0.75rem'}}>
                            <a href="#" onClick={() => setShowModal('project')} style={{textDecoration: 'none', color: 'var(--text-dark)', display: 'flex', alignItems: 'center', gap: '0.5rem', fontSize: '0.9rem'}}>
                                <i data-feather="plus-circle" style={{width: '18px'}}></i> Add Project
                            </a>
                        </li>
                        <li style={{marginBottom: '0.75rem'}}>
                            <a href="#" onClick={() => setShowModal('ticket')} style={{textDecoration: 'none', color: 'var(--text-dark)', display: 'flex', alignItems: 'center', gap: '0.5rem', fontSize: '0.9rem'}}>
                                <i data-feather="file-plus" style={{width: '18px'}}></i> Add Ticket
                            </a>
                        </li>
                        <li style={{marginBottom: '0.75rem'}}>
                            <a href="#" onClick={() => setShowModal('asset')} style={{textDecoration: 'none', color: 'var(--text-dark)', display: 'flex', alignItems: 'center', gap: '0.5rem', fontSize: '0.9rem'}}>
                                <i data-feather="database" style={{width: '18px'}}></i> Asset
                            </a>
                        </li>

                        <li style={{marginTop: '2rem', borderTop: '1px solid var(--border-color)', paddingTop: '1rem'}}>
                            <a href="login.html" style={{textDecoration: 'none', color: 'var(--text-muted)', display: 'flex', alignItems: 'center', gap: '0.5rem'}}>
                                <i data-feather="log-out"></i> Logout
                            </a>
                        </li>
                    </ul>
                </div>
            );
        }

        function AdminDashboard() {
            const [view, setView] = React.useState('dashboard');
            const [projects, setProjects] = React.useState([]);
            const [assets, setAssets] = React.useState([]);
            const [tickets, setTickets] = React.useState([]);
            const [riskSummary, setRiskSummary] = React.useState(null);
            
            // Filter States
            const [filterDate, setFilterDate] = React.useState("");
            const [filterPriority, setFilterPriority] = React.useState("");
            
            // Modal States
            const [showModal, setShowModal] = React.useState(null); // 'project', 'asset', 'ticket', null
            
            // Forms State
            const [newName, setNewName] = React.useState("");
            const [newVal, setNewVal] = React.useState(""); // reused for health/age depending on modal
            const [newDesc, setNewDesc] = React.useState("");
            const [duration, setDuration] = React.useState("");
            
            // New Ticket Params
            const [age, setAge] = React.useState(0);
            const [breakdowns, setBreakdowns] = React.useState(0);
            const [downtime, setDowntime] = React.useState(0);

            const fetchData = () => {
                fetch('api/projects.php').then(r=>r.json()).then(d => { if(d.status==='success') setProjects(d.data); });
                fetch('api/assets.php').then(r=>r.json()).then(d => { if(d.status==='success') setAssets(d.data); });
                fetch('api/tickets.php').then(r=>r.json()).then(d => { if(d.status==='success') setTickets(d.data); });
                fetch('api/risk_analysis.php').then(r=>r.json()).then(d => { if(d.status==='success') setRiskSummary(d.data); });
            };

            React.useEffect(() => { fetchData(); }, []);
            React.useEffect(() => { feather.replace(); });

            const handleSubmit = async (e, type) => {
                e.preventDefault();
                let url = '', body = {};
                
                if (type === 'project') {
                    url = 'api/projects.php';
                    body = { name: newName, status: 'Active', health: 100, duration: duration };
                } else if (type === 'asset') {
                    url = 'api/assets.php';
                    body = { name: newName, age: newVal || 0, risk_level: 'Low' };
                } else if (type === 'ticket') {
                    url = 'api/tickets.php';
                    const projectID = document.getElementById('project-select')?.value || 0;
                    body = { 
                        asset_id: newVal, 
                        project_id: projectID, 
                        description: newDesc, 
                        age: age,
                        breakdown_count: breakdowns,
                        repair_cost: 0,
                        downtime_hours: downtime,
                        priority: document.getElementById('priority-select')?.value || 'Normal' 
                    };
                }

                try {
                    await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    setShowModal(null);
                    setNewName(""); setNewVal(""); setNewDesc(""); setDuration("");
                    setAge(0); setBreakdowns(0); setDowntime(0);
                    fetchData();
                } catch (e) { console.error("Error creating record", e); }
            };

            const updateProjectStatus = async (id, newStatus) => {
                try {
                    await fetch('api/projects.php', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id, status: newStatus })
                    });
                    fetchData();
                } catch (e) { console.error("Error updating status", e); }
            };

            const deleteAsset = async (id) => {
                if(!confirm("Are you sure you want to delete this asset?")) return;
                try {
                    await fetch('api/assets.php', {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id })
                    });
                    fetchData();
                } catch (e) { console.error("Error deleting asset", e); }
            };

            return (
                <div className="dash-layout">
                    <Sidebar setView={setView} setShowModal={setShowModal} />
                    <div className="main-content" style={{padding: '2rem'}}>
                        <div className="flex justify-between items-center" style={{marginBottom: '2rem'}}>
                            <div>
                                <h1 style={{fontSize: '1.75rem', fontWeight: 'bold'}}>Project Registry</h1>
                                <p style={{color: 'var(--text-muted)'}}>Overview of all active construction & infrastructure nodes.</p>
                            </div>
                            <div className="flex items-center gap-4">
                                <button className="btn btn-outline" onClick={() => setShowModal('ticket')}>+ Ticket</button>
                                <button className="btn btn-outline" onClick={() => setShowModal('asset')}>+ Asset</button>
                                <button className="btn btn-primary" onClick={() => setShowModal('project')}>+ Project</button>
                            </div>
                        </div>

                        {/* Sub Navigation */}
                        <div style={{marginBottom: '2rem', display: 'flex', gap: '1rem', borderBottom: '1px solid var(--border-color)', paddingBottom: '1rem', flexWrap: 'wrap'}}>
                            <button className={`btn ${view === 'dashboard' ? 'btn-primary' : 'btn-outline'}`} onClick={() => setView('dashboard')}>Dashboard</button>
                            <button className={`btn ${view === 'active_projects' ? 'btn-primary' : 'btn-outline'}`} onClick={() => setView('active_projects')}>View Active Projects</button>
                            <button className={`btn ${view === 'projects' ? 'btn-primary' : 'btn-outline'}`} onClick={() => setView('projects')}>View All Projects</button>
                            <button className={`btn ${view === 'assets' ? 'btn-primary' : 'btn-outline'}`} onClick={() => setView('assets')}>View All Assets</button>
                            <button className={`btn ${view === 'tickets' ? 'btn-primary' : 'btn-outline'}`} onClick={() => setView('tickets')}>View All Tickets</button>
                        </div>

                        {view === 'dashboard' && (
                            <>
                                <div className="grid-4" style={{marginBottom: '2.5rem'}}>
                                    <div className="card stat-card"><h3 style={{color: 'var(--text-muted)'}}>Total Projects</h3><p style={{fontSize: '2rem', fontWeight: 'bold'}}>{projects.length}</p></div>
                                    <div className="card stat-card" style={{borderLeftColor: 'var(--success)'}}><h3 style={{color: 'var(--text-muted)'}}>Total Assets</h3><p style={{fontSize: '2rem', fontWeight: 'bold'}}>{assets.length}</p></div>
                                    <div className="card stat-card" style={{borderLeftColor: '#f59e0b'}}><h3 style={{color: 'var(--text-muted)'}}>Open Tickets</h3><p style={{fontSize: '2rem', fontWeight: 'bold'}}>{tickets.filter(t=>t.status!=='Resolved').length}</p></div>
                                    <div className="card stat-card" style={{borderLeftColor: '#ef4444'}}><h3 style={{color: 'var(--text-muted)'}}>Est. Cost</h3><p style={{fontSize: '1.75rem', fontWeight: 'bold'}}>₹{riskSummary?.estimated_repair_costs || '0'}</p></div>
                                </div>
                                
                                <h2 style={{fontSize: '1.25rem', marginBottom: '1.5rem'}}>Active Deployments Overview</h2>
                                <div className="grid-2">
                                    {projects.filter(p => p.status === 'Active').map((p, i) => (
                                        <div className="card" key={i}>
                                            <div className="flex justify-between" style={{marginBottom: '1rem'}}>
                                                <h3 style={{fontSize: '1.25rem'}}>{p.name}</h3>
                                                <span style={{color: p.health > 80 ? 'var(--success)' : '#f59e0b', fontWeight: 'bold'}}>{p.health}% Health</span>
                                            </div>
                                            <div style={{width: '100%', height: '8px', background: '#e2e8f0', borderRadius: '4px', marginBottom: '1rem'}}>
                                                <div style={{width: `${p.health}%`, height: '100%', background: p.health > 80 ? 'var(--success)' : '#f59e0b', borderRadius: '4px'}}></div>
                                            </div>
                                            <div className="flex justify-between items-center">
                                                <p style={{fontSize: '0.85rem', color: 'var(--text-muted)'}}>Project ID: {p.id} | Status: {p.status} | Duration: {p.duration || 'N/A'}</p>
                                                <button 
                                                    onClick={() => updateProjectStatus(p.id, p.status === 'Active' ? 'Deactivated' : 'Active')} 
                                                    className={`btn ${p.status === 'Active' ? 'btn-outline' : 'btn-primary'}`}
                                                    style={{padding: '0.25rem 0.75rem', fontSize: '0.75rem'}}
                                                >
                                                    {p.status === 'Active' ? 'Deactivate' : 'Activate'}
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </>
                        )}

                        {view === 'active_projects' && (
                            <div className="card"><h3 style={{marginBottom: '1.5rem'}}>Active Projects</h3><table style={{width: '100%', borderCollapse: 'collapse', textAlign: 'left'}}>
                                <thead><tr style={{borderBottom: '2px solid var(--border-color)'}}><th>ID</th><th>Project Name</th><th>Status</th><th>Duration</th><th>Current Health</th><th>Actions</th></tr></thead>
                                <tbody>{projects.filter(p => p.status === 'Active').map((p, i) => (
                                    <tr key={i} style={{borderBottom: '1px solid var(--border-color)'}}>
                                        <td style={{padding:'1rem 0'}}>{p.id}</td>
                                        <td>{p.name}</td>
                                        <td>{p.status}</td>
                                        <td>{p.duration || 'N/A'}</td>
                                        <td style={{color: p.health > 80 ? 'var(--success)' : (p.health > 50 ? '#f59e0b' : '#ef4444'), fontWeight: 'bold'}}>{p.health}%</td>
                                        <td>
                                            <button 
                                                onClick={() => updateProjectStatus(p.id, 'Deactivated')} 
                                                className="btn btn-outline"
                                                style={{padding: '0.25rem 0.75rem', fontSize: '0.75rem'}}
                                            >
                                                Deactivate
                                            </button>
                                        </td>
                                    </tr>
                                ))}</tbody>
                            </table></div>
                        )}

                        {view === 'projects' && (
                            <div className="card"><h3 style={{marginBottom: '1.5rem'}}>All Projects</h3><table style={{width: '100%', borderCollapse: 'collapse', textAlign: 'left'}}>
                                <thead><tr style={{borderBottom: '2px solid var(--border-color)'}}><th>ID</th><th>Project Name</th><th>Status</th><th>Duration</th><th>Current Health</th><th>Actions</th></tr></thead>
                                <tbody>{projects.map((p, i) => (
                                    <tr key={i} style={{borderBottom: '1px solid var(--border-color)'}}>
                                        <td style={{padding:'1rem 0'}}>{p.id}</td>
                                        <td>{p.name}</td>
                                        <td>{p.status}</td>
                                        <td>{p.duration || 'N/A'}</td>
                                        <td style={{color: p.health > 80 ? 'var(--success)' : (p.health > 50 ? '#f59e0b' : '#ef4444'), fontWeight: 'bold'}}>{p.health}%</td>
                                        <td>
                                            <button 
                                                onClick={() => updateProjectStatus(p.id, p.status === 'Active' ? 'Deactivated' : 'Active')} 
                                                className={`btn ${p.status === 'Active' ? 'btn-outline' : 'btn-primary'}`}
                                                style={{padding: '0.25rem 0.75rem', fontSize: '0.75rem'}}
                                            >
                                                {p.status === 'Active' ? 'Deactivate' : 'Activate'}
                                            </button>
                                        </td>
                                    </tr>
                                ))}</tbody>
                            </table></div>
                        )}
                        {view === 'assets' && (
                            <div className="card"><h3 style={{marginBottom: '1.5rem'}}>All Assets</h3><table style={{width: '100%', borderCollapse: 'collapse', textAlign: 'left'}}>
                                <thead><tr style={{borderBottom: '2px solid var(--border-color)'}}><th>ID</th><th>Asset Name</th><th>Age</th><th>Actions</th></tr></thead>
                                <tbody>{assets.map((p, i) => (
                                    <tr key={i} style={{borderBottom: '1px solid var(--border-color)'}}>
                                        <td style={{padding:'1rem 0'}}>{p.id}</td>
                                        <td>{p.name}</td>
                                        <td>{p.age} yrs</td>
                                        <td>
                                            <button 
                                                onClick={() => deleteAsset(p.id)} 
                                                className="btn btn-outline"
                                                style={{padding: '0.25rem 0.75rem', fontSize: '0.75rem', borderColor: '#ef4444', color: '#ef4444'}}
                                            >
                                                Delete
                                            </button>
                                        </td>
                                    </tr>
                                ))}</tbody>
                            </table></div>
                        )}
                        {view === 'tickets' && (
                            <div className="card">
                                <div className="flex justify-between items-center" style={{marginBottom: '1.5rem'}}>
                                    <h3 style={{marginBottom: 0}}>All Tickets</h3>
                                    <div className="flex items-center gap-4">
                                        <div>
                                            <label style={{fontSize: '0.85rem', marginRight: '0.5rem', color: 'var(--text-muted)'}}>Date:</label>
                                            <input type="date" className="form-input" value={filterDate} onChange={e => setFilterDate(e.target.value)} style={{padding: '0.25rem 0.5rem', width: 'auto', display: 'inline-block'}} />
                                        </div>
                                        <div>
                                            <label style={{fontSize: '0.85rem', marginRight: '0.5rem', color: 'var(--text-muted)'}}>Priority:</label>
                                            <select className="form-select" value={filterPriority} onChange={e => setFilterPriority(e.target.value)} style={{padding: '0.25rem 0.5rem', width: 'auto', display: 'inline-block'}}>
                                                <option value="">All Priorities</option>
                                                <option value="Normal">Normal</option>
                                                <option value="High">High</option>
                                                <option value="Critical">Critical</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                                <table style={{width: '100%', borderCollapse: 'collapse', textAlign: 'left'}}>
                                <thead><tr style={{borderBottom: '2px solid var(--border-color)'}}><th>ID</th><th>Description</th><th>Project</th><th>Asset</th><th>Priority</th><th>Logged Cost</th><th>Status</th><th>Created At</th><th>Updated At</th></tr></thead>
                                <tbody>{tickets.filter(t => {
                                    if(filterPriority && t.priority !== filterPriority) return false;
                                    if(filterDate && t.created_at && !t.created_at.startsWith(filterDate)) return false;
                                    return true;
                                }).map((p, i) => (
                                    <tr key={i} style={{borderBottom: '1px solid var(--border-color)'}}>
                                        <td style={{padding:'1rem 0'}}>{p.id}</td>
                                        <td>{p.description.includes('] - ') ? p.description.split('] - ')[1] : p.description}</td>
                                        <td>{p.project_name || 'N/A'}</td>
                                        <td>{p.asset_name || p.asset_id}</td>
                                        <td>
                                            <span style={{
                                                backgroundColor: p.priority === 'Critical' ? '#fee2e2' : (p.priority === 'High' ? '#ffedd5' : '#f3f4f6'), 
                                                color: p.priority === 'Critical' ? '#991b1b' : (p.priority === 'High' ? '#9a3412' : '#374151'), 
                                                padding: '0.25rem 0.75rem', borderRadius: '4px', fontSize: '0.75rem', fontWeight: 'bold', display: 'inline-block'
                                            }}>
                                                {p.priority || 'Normal'}
                                            </span>
                                        </td>
                                        <td style={{fontWeight: '600', color: 'var(--teal-primary)'}}>₹{parseFloat(p.repair_cost || 0).toFixed(2)}</td>
                                        <td>
                                            <span style={{
                                                backgroundColor: p.status === 'Resolved' ? '#dcfce7' : (p.status === 'Open' ? '#fef3c7' : '#dbeafe'), 
                                                color: p.status === 'Resolved' ? '#15803d' : (p.status === 'Open' ? '#b45309' : '#1d4ed8'), 
                                                padding: '0.25rem 0.75rem', borderRadius: '9999px', fontSize: '0.75rem', fontWeight: 'bold', display: 'inline-block'
                                            }}>
                                                {p.status}
                                            </span>
                                        </td>
                                        <td>{p.created_at ? new Date(p.created_at).toLocaleString() : 'N/A'}</td>
                                        <td>{p.updated_at ? new Date(p.updated_at).toLocaleString() : 'N/A'}</td>
                                    </tr>
                                ))}</tbody>
                            </table></div>
                        )}
                    </div>

                    {showModal && (
                        <div className="modal-overlay">
                            <div className="card" style={{width: '450px', padding: '2rem'}}>
                                <h2 style={{marginBottom: '1.5rem'}}>Create New {showModal}</h2>
                                <form onSubmit={(e) => handleSubmit(e, showModal)}>
                                    {showModal !== 'ticket' && (
                                        <>
                                            <div className="form-group"><label className="form-label">Name</label><input type="text" className="form-input" value={newName} onChange={e=>setNewName(e.target.value)} required /></div>
                                            {showModal === 'project' && (
                                                <div className="form-group">
                                                    <label className="form-label">Duration (Ex: 6 Months, 1 Year)</label>
                                                    <input type="text" className="form-input" value={duration} onChange={e=>setDuration(e.target.value)} required />
                                                </div>
                                            )}
                                            {showModal === 'asset' && (
                                                <div className="form-group">
                                                    <label className="form-label">Age (Years)</label>
                                                    <input type="number" className="form-input" value={newVal} onChange={e=>setNewVal(e.target.value)} required min="0" />
                                                </div>
                                            )}
                                        </>
                                    )}
                                    {showModal === 'ticket' && (
                                        <>
                                            <div className="form-group">
                                                <label className="form-label">Project</label>
                                                <select id="project-select" className="form-select" required>
                                                    <option value="">-- Choose Project --</option>
                                                    {projects.filter(p => p.status === 'Active').map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                                </select>
                                            </div>
                                            <div className="form-group">
                                                <label className="form-label">Target Asset</label>
                                                <select className="form-select" value={newVal} onChange={(e) => {
                                                    const id = e.target.value; setNewVal(id);
                                                    const ast = assets.find(a => a.id == id);
                                                    if(ast) { setAge(ast.age); setBreakdowns(ast.breakdown_count); setDowntime(ast.age*2); }
                                                }} required>
                                                    <option value="">-- Choose Asset from Database --</option>
                                                    {assets.map(a => <option key={a.id} value={a.id}>{a.name} (ID: {a.id})</option>)}
                                                </select>
                                            </div>
                                            <div className="grid-2" style={{marginBottom: '1rem'}}>
                                                <div className="form-group"><label className="form-label">Age</label><input type="number" className="form-input" value={age} onChange={e=>setAge(e.target.value)} min="0" /></div>
                                                <div className="form-group"><label className="form-label">Breakdowns</label><input type="number" className="form-input" value={breakdowns} onChange={e=>setBreakdowns(e.target.value)} min="0" /></div>
                                            </div>
                                            <div className="form-group" style={{marginBottom: '1.5rem'}}>
                                                <label className="form-label">Downtime (h)</label>
                                                <input type="number" className="form-input" value={downtime} onChange={e=>setDowntime(e.target.value)} min="0" />
                                            </div>
                                            <div className="form-group">
                                                <label className="form-label">Ticket Priority</label>
                                                <select id="priority-select" className="form-select" required>
                                                    <option value="Normal">Normal</option>
                                                    <option value="High">High</option>
                                                    <option value="Critical">Critical</option>
                                                </select>
                                            </div>
                                            <div className="form-group"><label className="form-label">Description</label><input type="text" className="form-input" value={newDesc} onChange={e=>setNewDesc(e.target.value)} required /></div>
                                        </>
                                    )}
                                    <div className="flex gap-4" style={{marginTop: '2rem'}}>
                                        <button type="button" className="btn btn-outline" style={{flex: 1}} onClick={() => setShowModal(null)}>Cancel</button>
                                        <button type="submit" className="btn btn-primary" style={{flex: 1}}>Create</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminDashboard />);
    </script>
</body>
</html>
